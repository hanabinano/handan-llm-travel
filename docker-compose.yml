services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: handan_travel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PUBLISH:-127.0.0.1:5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH:-127.0.0.1:6379:6379}"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/handan_travel
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    restart: unless-stopped
    ports:
      - "${API_PUBLISH:-127.0.0.1:3001:3001}"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:3001/api/v1}
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISH:-3000:3000}"

volumes:
  postgres_data:
